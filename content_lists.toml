# content_lists.toml
# Defines named pools of placeable objects for use in room layouts.
# Place this file in the same directory as your layout .toml files.
#
# Each [[items]] entry is one object. Items sharing the same "list" name
# are grouped together. Rooms reference lists by name in their TOML:
#
#   [[rooms]]
#   furniture = ["furniture_office", "metal_shelves"]
#   lights    = ["fluorescent_lights"]
#
# ── Placement ────────────────────────────────────────────────────────────────
# placement = "anywhere"   (default) interior and wall pieces
# placement = "walls"      wall pieces only, item auto-rotates to face inward
# placement = "interior"   non-perimeter interior pieces only
# placement = "corners"    corner pieces only, item auto-rotates to face room centre
#
# ── Rotation ─────────────────────────────────────────────────────────────────
# base_rot  = [rx, ry, rz]   fixed correction in radians (default: [0,0,0])
#                             e.g. base_rot = [1.5708, 0, 0] lays a model flat
# jitter    = <radians>       max ± random yaw (default: 6.2832 = full random)
#                             0.0 = locked, 0.7854 = ±45°
#
# ── Wall depth ───────────────────────────────────────────────────────────────
# wall_depth = <units>       distance to push item from the piece centre toward
#                            the outer wall face. 64 (default) = near the wall
#                            surface. 0 = piece centre. 128 = at the outer face.
#
# ── Z offset ─────────────────────────────────────────────────────────────────
# z_offset  = <units>        height above floor for the item's reference point
#
# ── Companions ───────────────────────────────────────────────────────────────
# [[items.companions]] places an extra object relative to the parent:
#   forward    = units along the parent's facing direction
#   right      = units to the parent's right
#   rot_offset = yaw in radians relative to parent (3.141593 = PI = face parent)
#
# ── Surface scatter ───────────────────────────────────────────────────────────
# [[items.surface_scatter]] scatters random items from a pool on the parent's
# surface. Items are drawn from the named list and placed within the zone.
#   list     = name of the content list to draw from
#   count    = number of items to place (default: 1)
#   z_offset = absolute surface height above the floor
#   x_range  = half-width of scatter zone along the wall (parent's right axis)
#   y_range  = half-depth of scatter zone into the room (parent's forward axis)
#
# ── Form IDs ─────────────────────────────────────────────────────────────────
# Hex literals are supported: form_id = 0x000CCF93
# High byte 0x00 = FalloutNV.esm (base game). Verify FormIDs in FNVEdit.

# ── Kits ─────────────────────────────────────────────────────────────────────
# Each [[kits]] entry defines the structural FormIDs for one room kit.
# Reference a kit in a layout TOML with:  kit = "office"
#
# All FormIDs are from FalloutNV.esm (high byte 0x00 = base game).
# Verify IDs in FNVEdit.
# Optional fields: acoustic_space, music_type, image_space, corridor_*.
# Omit corridor_* fields entirely if the kit has no hallway mesh variants;
# using such a kit for a corridor room (width=1 or length=1) will abort with an error.
#
# Per-piece-family rotation adjustments (all optional, default 0.0 unless noted):
#
# room_mid_rot_adj       = <radians>   extra yaw for interior floor pieces
# wall_straight_rot_adj  = <radians>   extra yaw for wall_straight pieces
# wall_corner_rot_adj    = <radians>   extra yaw for all corner pieces
# corridor_rot_adj       = <radians>   extra yaw for all corridor pieces (entrance, middle, terminal)
#
# wall_doorway_rot_adj   = <radians>
#   Extra rotation applied to wall_doorway pieces ON TOP OF wall_straight_rot_adj.
#   Default 1.5708 (PI/2) matches the office kit (doorway mesh is 90° CCW of wall_straight).
#   Set to 0.0 if the kit's doorway mesh is already aligned with wall_straight.
#   Common values: 0.0, 1.5708 (PI/2), 3.1416 (PI), 4.7124 (3PI/2)

